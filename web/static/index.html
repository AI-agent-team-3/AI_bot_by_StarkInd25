<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>F1 AI Chat</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #0b0b0b;
            color: #fff;
        }

        .header {
            position: relative;
            padding: 18px 20px;
            background: linear-gradient(90deg, #0b0b0b 0%, #1a1a1a 100%);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            background: linear-gradient(90deg, #e10600, transparent);
        }
        .logo { font-weight: bold; font-size: 18px; display:flex; gap:10px; }
        .logo span { color: #e10600; }
        .status { font-size: 12px; color: #aaa; }
        .status::before { content: "●"; color: #00ff88; margin-right:6px; }

        .chat-container { max-width: 800px; margin: auto; height: 85vh; display: flex; flex-direction: column; padding: 20px; }
        .chat { flex:1; overflow-y:auto; padding-right:10px; display:flex; flex-direction:column; }

        .message { margin:10px 0; padding:12px 16px; border-radius:10px; max-width:75%; word-wrap:break-word; animation:fadeIn 0.2s ease-in; }
        .user { background:#e10600; align-self:flex-end; text-align:right; margin-left:auto; }
        .bot { background:#1c1c1c; border-left:3px solid #e10600; align-self:flex-start; text-align:left; margin-right:auto; }

        .input-area { display:flex; margin-top:15px; }
        input { flex:1; padding:12px; border:none; outline:none; background:#1c1c1c; color:white; border-radius:6px 0 0 6px; }
        button { padding:12px 20px; border:none; background:#e10600; color:white; font-weight:bold; cursor:pointer; border-radius:0 6px 6px 0; transition:0.2s; }
        button:hover { background:#ff1a1a; }

        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-thumb { background:#e10600; border-radius:3px; }

        @keyframes fadeIn { from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:translateY(0);} }

        /* Три точки "печатает..." */
        .typing-dot { display:inline-block; animation:typing 1s infinite; }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing { 0%, 20% { opacity:0; } 50% { opacity:1; } 100% { opacity:0; } }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">🏎️ <span>F1</span> AI ENGINE</div>
    <div class="status">online</div>
</div>

<div class="chat-container">
    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Спроси про Формулу-1..." />
        <button onclick="sendMessage()">SEND</button>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");
    const message = input.value;
    if (!message.trim()) return;

    // USER MESSAGE
    const userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerText = message;
    chat.appendChild(userDiv);
    chat.scrollTop = chat.scrollHeight;
    input.value = "";

    // BOT "typing..."
    const typingDiv = document.createElement("div");
    typingDiv.className = "message bot";
    typingDiv.innerHTML = '<span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span>';
    chat.appendChild(typingDiv);
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("/chat", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({user_id:1, message:message})
        });
        const data = await res.json();

        // заменяем "печатает" на реальный ответ
        typingDiv.innerHTML = '';
        typingDiv.innerText = data.response;
        chat.scrollTop = chat.scrollHeight;

    } catch(err) {
        typingDiv.innerHTML = '';
        typingDiv.innerText = "Ошибка связи с сервером";
        chat.scrollTop = chat.scrollHeight;
    }
}

// ENTER = отправка
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
